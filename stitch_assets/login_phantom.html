<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Masuk - Money Flow</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

            text-transform: none;
            display: inline-block;
            white-space: nowrap;

            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

                        "on-tertiary-container": "#576276",

                        "xl": "0.75rem",

                    "spacing": {
                        "stack-lg": "48px",
                        "gutter": "24px",

<body class="bg-background text-on-background font-body-md min-h-screen w-full relative overflow-hidden flex items-center justify-center p-container-padding-mobile md:p-container-padding-desktop">
<!-- Deep Background & Ambient Image -->
<div class="fixed inset-0 z-0">
<!-- The requested image as a textural background element, heavily blended to maintain the dark navy requirement -->
<div class="absolute inset-0 bg-no-repeat bg-cover bg-center opacity-30 mix-blend-luminosity scale-110" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCfLeXVK_X7-O8oNsYiT3PpDV1_eA0cvGtSzYvh4dwE4gwbf_n_Zjy267iv-whztZy1764o3-QpiF4UIkK42NLtr2FcuFXhxFkpDPxG3yU0osfKu8cV-DIPb52k8SPc7IyC7fh_YuZJcCAuqESfefDGYYmdkEpWT1TmlpNcuqghVH9PA70mH2Ug2JwJeT4sMRZRwmP71kEY5rJbYE4wyU3W6CstlpsgwgABnYgpVNx2DQnR_Pwcj1edASnaLTS__aD9u8LmMaG5S84'); filter: blur(20px);"></div>
<!-- Gradient overlay to push it into the "Void" -->
<div class="absolute inset-0 bg-gradient-to-b from-background/90 via-background to-background/95"></div>
<!-- Ambient Glowing Orbs for Depth -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-fixed-dim/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary-fixed-dim/10 rounded-full blur-[100px] pointer-events-none"></div>
</div>
<!-- Main Glassmorphic Login Card (The Focus Layer) -->
<main class="relative z-10 w-full max-w-[420px] backdrop-blur-[40px] bg-white/[0.03] border border-white/10 rounded-[24px] shadow-[inset_0_1px_0_0_rgba(255,255,255,0.05),0_30px_60px_rgba(0,0,0,0.6)] p-8 md:p-10 flex flex-col gap-stack-md">
<!-- Header -->
<div class="flex flex-col items-center text-center gap-2">
<div class="w-12 h-12 rounded-xl bg-primary-fixed-dim/20 border border-primary-fixed-dim/30 flex items-center justify-center mb-2 shadow-[inset_0_0_15px_rgba(0,220,229,0.2)]">
<span class="material-symbols-outlined text-primary-fixed-dim text-2xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-background tracking-tighter">Masuk ke Money Flow</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Akses dashboard finansial Anda</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-sm w-full mt-4" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 group-focus-within:text-primary-fixed-dim transition-colors text-[20px]">mail</span>
<input class="w-full bg-surface-container-lowest/50 border border-white/10 rounded-lg py-3 pl-10 pr-4 text-on-background font-body-md text-body-md shadow-[inset_0_2px_4px_rgba(0,0,0,0.4)] placeholder:text-on-surface-variant/30 focus:outline-none focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim focus:shadow-[0_0_12px_rgba(0,220,229,0.3)] transition-all bg-transparent" id="email" placeholder="nama@email.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-1 mt-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Kata Sandi</label>
<a class="font-label-sm text-label-sm text-primary-fixed-dim hover:text-primary-fixed transition-colors" href="#">Lupa sandi?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 group-focus-within:text-primary-fixed-dim transition-colors text-[20px]">lock</span>
<input class="w-full bg-surface-container-lowest/50 border border-white/10 rounded-lg py-3 pl-10 pr-4 text-on-background font-body-md text-body-md shadow-[inset_0_2px_4px_rgba(0,0,0,0.4)] placeholder:text-on-surface-variant/30 focus:outline-none focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim focus:shadow-[0_0_12px_rgba(0,220,229,0.3)] transition-all bg-transparent" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Login Button -->
<button class="mt-6 w-full bg-primary-fixed-dim/80 text-on-primary-fixed font-label-sm text-label-sm font-bold tracking-wide rounded-lg py-3.5 px-4 flex items-center justify-center gap-2 hover:bg-primary-fixed-dim hover:shadow-[0_0_20px_rgba(0,220,229,0.4)] transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]" type="submit">
<span>Masuk</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 w-full opacity-60">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-white/20"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">atau</span>
<div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-white/20"></div>
</div>
<!-- Social / Alternative Logins (Ghost Buttons) -->
<div class="flex flex-col gap-3 w-full">
<button class="w-full bg-transparent border border-white/10 text-on-background font-label-sm text-label-sm rounded-lg py-3 px-4 flex items-center justify-center gap-3 hover:bg-white/5 hover:border-white/20 hover:shadow-[inset_0_1px_0_0_rgba(255,255,255,0.1)] transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]" type="button">
<!-- Custom Google-like Icon mapping to generic design system requirement -->
<span class="material-symbols-outlined text-[20px]">language</span>
<span>Lanjutkan dengan Google</span>
</button>
<button class="w-full bg-transparent border border-white/10 text-on-background font-label-sm text-label-sm rounded-lg py-3 px-4 flex items-center justify-center gap-3 hover:bg-white/5 hover:border-white/20 hover:shadow-[inset_0_1px_0_0_rgba(255,255,255,0.1)] transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]" type="button">
<span class="material-symbols-outlined text-[20px]">person</span>
<span>Lanjutkan sebagai Tamu</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center mt-2">
<p class="font-body-md text-body-md text-on-surface-variant">
                Belum punya akun? <a class="text-primary-fixed-dim font-bold hover:text-primary-fixed hover:underline underline-offset-4 transition-colors" href="#">Daftar</a>
</p>
</div>
</main>
</body></html>
